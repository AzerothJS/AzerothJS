# The same gates you run locally, on every push: check, build, test.
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npx azeroth check
      - run: npx azeroth build
      - run: npm test --workspaces --if-present
