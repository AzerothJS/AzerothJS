name: Release

# Fires when the release script pushes a version tag (e.g. v0.7.0-beta.1). This
# workflow does NOT publish to npm - that stays in scripts/release.mjs, which
# handles the lockstep bump, dist-tags, and 2FA locally. Its job is to (1) prove
# the tagged commit builds and its tests pass on a clean checkout, (2) create
# a GitHub Release with auto-generated, categorised notes (see .github/release.yml),
# and (3) build BOTH editor plugins from the tagged code and attach them to the
# release, so every release ships installable editor artifacts.
on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

# Never cancel an in-progress release: two tags pushed close together must each
# complete their own run.
concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release:
        name: Verify tag and publish GitHub Release
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            -   uses: actions/checkout@v7
                with:
                    fetch-depth: 0

            -   uses: actions/setup-node@v7
                with:
                    node-version: 24
                    cache: npm
                    cache-dependency-path: |
                        package-lock.json
                        editors/vscode/package-lock.json

            -   run: npm ci

            # The tag must build and pass the full gate on a clean machine, not just
            # on the maintainer's box.
            -   run: npm run lint
            -   run: npm run build
            -   run: npm test
            -   run: npm run leak

            # --- Editor artifacts, built from the exact tagged code. ---
            # VS Code: the server bundle's esbuild entry is the language-server dist,
            # already built by the gate above.
            # `npm install`, not `npm ci`: the extension's @azerothjs pins are bumped by the
            # release flow BEFORE those versions can exist on the registry, so its lockfile
            # is perpetually one release behind - npm ci would fail on the manifest mismatch.
            -   run: npm install --no-audit --no-fund
                working-directory: editors/vscode
            -   run: npm run bundle
                working-directory: editors/vscode
            -   run: node package.mjs
                working-directory: editors/vscode

            # JetBrains: bundleServer consumes editors/vscode/dist/server.js from the
            # step above. Gradle cache keeps the pinned IDE download to the first run.
            -   uses: actions/setup-java@v5
                with:
                    distribution: temurin
                    java-version: 21
            -   uses: gradle/actions/setup-gradle@v6
            -   run: chmod +x editors/jetbrains/gradlew
            -   run: ./gradlew buildPlugin --console=plain
                working-directory: editors/jetbrains

            -   name: Create GitHub Release
                env:
                    GH_TOKEN: ${{ github.token }}
                    TAG: ${{ github.ref_name }}
                shell: bash
                run: |
                    # A tag containing a hyphen is a prerelease (v0.7.0-beta.1); a bare
                    # version (v1.0.0) is a stable release.
                    prerelease=""
                    case "$TAG" in
                      *-*) prerelease="--prerelease" ;;
                    esac
                    # Idempotent: if a release already exists for this tag (e.g. the tag was
                    # re-pushed), skip rather than fail the run.
                    if gh release view "$TAG" >/dev/null 2>&1; then
                      echo "Release $TAG already exists - skipping."
                    else
                      gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag $prerelease
                    fi

            -   name: Attach editor artifacts
                env:
                    GH_TOKEN: ${{ github.token }}
                    TAG: ${{ github.ref_name }}
                shell: bash
                # --clobber makes a re-run of this workflow refresh the assets instead
                # of failing on the existing ones.
                run: |
                    gh release upload "$TAG" --clobber \
                      editors/vscode/dist/*.vsix \
                      editors/jetbrains/build/distributions/*.zip
