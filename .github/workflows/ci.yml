name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Test
        run: npx vitest run

  package-extension:
    name: Package VS Code extension
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build runtime + language packages
        run: npm run build

      - name: Package .vsix
        run: npm run package -w azerothjs-vscode

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: azerothjs-vscode
          path: editors/vscode/dist/*.vsix
