name: CI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

# Least privilege: CI only needs to read the repository. No job here writes to
# the repo, comments, or publishes, so no other scope is granted.
permissions:
    contents: read

# A new push to a branch/PR cancels the in-progress run for that ref, so only the
# latest commit is validated (saves CI minutes on rapid pushes).
concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

# The project targets Node >= 24 (see root package.json `engines`); every job runs
# on that floor so tooling (e.g. lint-staged, which requires a recent Node) installs.
env:
    NODE_VERSION: 24

# Job layout note: the full 15-package build is deliberately DUPLICATED in the test
# and build jobs instead of shared via artifacts. Measured locally: the build takes
# ~15s, which is less than an artifact upload+download round trip would cost - and
# sharing would serialize jobs that currently run in parallel. Revisit only if the
# build outgrows ~1 minute.

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            -   uses: actions/checkout@v7
            -   uses: actions/setup-node@v6
                with:
                    node-version: ${{ env.NODE_VERSION }}
                    cache: npm
            -   run: npm ci
            -   run: npm run lint

    typecheck:
        name: Typecheck
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            -   uses: actions/checkout@v7
            -   uses: actions/setup-node@v6
                with:
                    node-version: ${{ env.NODE_VERSION }}
                    cache: npm
            -   run: npm ci
            # tsc over the whole monorepo (tsconfig.json project). The vitest suite
            # runs through esbuild-style transforms that do NOT type-check, so this
            # is the only gate that proves the source compiles as TypeScript.
            -   run: npm run typecheck

    test:
        name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 20
        strategy:
            # One failing cell should not hide failures in the others - we want the
            # full cross-OS picture from a single run.
            fail-fast: false
            matrix:
                # Node 24 is the supported floor (engines: ">=24"). Linux plus a Windows
                # cell: Windows is the maintainer's primary dev platform, and the compiler
                # does path / line-ending work where POSIX-vs-Windows differences surface.
                os: [ ubuntu-latest ]
                node: [ 24 ]
                include:
                    -   os: windows-latest
                        node: 24
        steps:
            -   uses: actions/checkout@v7
            -   uses: actions/setup-node@v6
                with:
                    node-version: ${{ matrix.node }}
                    cache: npm
            -   run: npm ci
            # Most of the suite runs against src via the workspace aliases in
            # vitest.config.ts, but the control-flow type-check tests resolve the REAL
            # `@azerothjs/core` types through node_modules (its `types` points at dist),
            # so the packages must be built first.
            -   run: npm run build
            # Linux runs the suite WITH coverage (measured overhead: +6s over the plain
            # run - not worth a separate job); Windows runs it plain to keep the slower
            # runner on the critical path minimal. Coverage failing = tests failing, so
            # the gate is identical.
            -   name: Test (with coverage)
                if: runner.os == 'Linux'
                shell: bash
                run: npm run test:coverage -- --coverage.reporter=text --coverage.reporter=json-summary --coverage.reporter=html
            -   name: Test
                if: runner.os != 'Linux'
                run: npm test
            -   name: Coverage summary
                if: runner.os == 'Linux'
                shell: bash
                run: |
                    node -e '
                    const fs = require("fs");
                    const path = "coverage/coverage-summary.json";
                    if (!fs.existsSync(path)) process.exit(0);
                    const total = JSON.parse(fs.readFileSync(path, "utf8")).total;
                    const row = (k) => `| ${k} | ${total[k].pct}% (${total[k].covered}/${total[k].total}) |`;
                    const lines = ["## Coverage", "", "| Metric | Covered |", "| --- | --- |",
                        row("lines"), row("statements"), row("functions"), row("branches")];
                    fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
                    '
            -   name: Upload coverage report
                if: runner.os == 'Linux'
                uses: actions/upload-artifact@v7
                with:
                    name: coverage-report
                    path: coverage/
                    retention-days: 14

    build:
        name: Build & leak check
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            -   uses: actions/checkout@v7
            -   uses: actions/setup-node@v6
                with:
                    node-version: ${{ env.NODE_VERSION }}
                    cache: npm
            -   run: npm ci
            # Proves all packages still compile and emit their declarations.
            -   run: npm run build
            # Validates the published package.json contract (exports/types/format/bin),
            # which the src-aliased test suite never exercises. Requires the build above.
            -   run: npm run lint:publish
            # Deterministic reactive-graph leak gate (build output is required: the gate
            # imports @azerothjs/reactivity from its published dist).
            -   run: npm run leak
