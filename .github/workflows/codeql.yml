name: CodeQL

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    schedule:
        # Weekly, so newly published CodeQL queries catch issues even on weeks with
        # no commits. Monday 07:00 UTC.
        -   cron: '0 7 * * 1'

# CodeQL needs to read the code and write its findings to the Security tab.
permissions:
    contents: read
    security-events: write

concurrency:
    group: codeql-${{ github.ref }}
    cancel-in-progress: true

jobs:
    analyze:
        name: Analyze (JavaScript/TypeScript)
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v7

            -   name: Initialize CodeQL
                uses: github/codeql-action/init@v4
                with:
                    # java-kotlin was evaluated for editors/jetbrains and DECLINED: CodeQL's
                    # Kotlin analysis needs a working Gradle build inside the CodeQL runner,
                    # which for this plugin means resolving the ~1.5 GB pinned IntelliJ
                    # Platform on every weekly run - for ~10 Kotlin UI-adapter files with no
                    # untrusted-input surface. The security-relevant code (parser/compiler/
                    # language server operating on untrusted source text) is all TypeScript
                    # and fully covered below.
                    languages: javascript-typescript
                    # security-and-quality adds maintainability/correctness queries on top
                    # of the default security set - useful for a parser/compiler that runs
                    # over untrusted source text.
                    queries: security-and-quality

            -   name: Autobuild
                uses: github/codeql-action/autobuild@v4

            -   name: Perform CodeQL analysis
                uses: github/codeql-action/analyze@v4
